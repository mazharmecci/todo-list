<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ISTOS Todo List Grid</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />

    <!-- android App Settings -->
  <link rel="manifest" href="manifest.json">

  <!-- iOS App Settings -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Todo">
  <link rel="apple-touch-icon" href="istos-mob.png">
  
  <!-- ✅ Firebase v8 SDKs for browser compatibility -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
  
  <header class="header">
    <h2 class="title">TODO</h2>
    <div class="logo-container">
      <img src="istos-logo.png" alt="ISTOS Logo" class="logo" />
    </div>
  </header>

  <main>
    <!-- 🔹 Login Section -->
    <section id="loginSection" class="centered-container">      
        <div class="auth-input-group">
          <input type="email" id="emailInput" class="auth-input" placeholder="Email" required />
          <input type="password" id="passwordInput" class="auth-input" placeholder="Password" required />
          <button class="auth-button" onclick="handleLogin()">Login</button>
        </div>      
    </section>

    <!-- ✅ Desktop Task Summary -->
    <div class="desktop-only">
      <aside class="task-count-panel hide-on-mobile">
        <div class="task-summary-header">
          <img src="istosmini.png" alt="Task Icon" class="task-icon" />
          <h3>Task Summary</h3>
        </div>
        <table class="task-count-table">
          <thead>
            <tr>
              <th>Category</th>
              <th>Tasks</th>
            </tr>
          </thead>
          <tbody id="taskCountBody">
            <!-- Rows will be injected dynamically -->
          </tbody>
        </table>
      </aside>
    </div>

    <!-- 🔹 Task Form -->
    <form id="taskForm" style="display:none;" onsubmit="handleSubmit(event)">
      <section class="task-input-section centered-container">
        <div class="input-row">
          <textarea id="taskInput" placeholder="Paste multiple tasks here..." rows="3"></textarea>
          <button type="submit">Add</button>
          <button type="button" class="logout-button" onclick="handleLogout()">Logout</button>
        </div>
        <hr class="divider" />
        <div class="checkbox-group">
          <label><input type="checkbox" id="orderCheckbox" /> 🚚 Orders</label>
          <label><input type="checkbox" id="leadsCheckbox" /> 🎯 Leads</label>
          <label><input type="checkbox" id="serviceCheckbox" /> 🛠️ Service</label>
          <label><input type="checkbox" id="officeCheckbox" /> 🏢 Office</label>
          <label><input type="checkbox" id="personalCheckbox" /> 🔔 Personal</label>
          <label><input type="checkbox" id="paymentCheckbox" /> 💰 Payments</label>
          <label><input type="checkbox" id="getCheckbox" /> 💵 Get-Payments</label>
          <label><input type="checkbox" id="tobeorderCheckbox" /> 🧾 To be ordered</label>
        </div>
      </section>
    </form>

    <hr class="section-divider" />

    <!-- 🔹 Task Grid -->
    <section id="todoGrid" class="todo-grid-wrapper"></section>
  </main>

  <!-- ✅ Your App Logic -->
  <script src="script.js"></script>

</body>
</html>
